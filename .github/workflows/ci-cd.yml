name: CI/CD Pipeline

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Testes Unitários
  # ─────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar testes unitários
        run: npm test

  # ─────────────────────────────────────────────
  # Job 2: Build & Push da imagem Docker para o Docker Hub
  # ─────────────────────────────────────────────
  publish:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: (github.ref == 'refs/heads/dev') && github.event_name == 'push'

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar QEMU
        uses: docker/setup-qemu-action@v3

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Construir e enviar imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/support-agent:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/support-agent:${{ github.sha }}
